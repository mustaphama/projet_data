version: '3.8'

services:
  webapp:
    container_name: webapp
    build:
      context: .
      dockerfile: Dockerfile 
    ports:
      - "8501:8501"
    networks:
      - shared_network
    environment:
      - PYTHONUNBUFFERED=1

networks:
  shared_network:
    name: mon_reseau_projet
    external: true